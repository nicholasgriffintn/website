name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - apps/web/**
  workflow_dispatch:

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Build Next.js app
        run: pnpm --filter web build
        env:
          NODE_ENV: production

      - name: Package for Lambda (open-next)
        run: pnpm --filter web build:lambda

      - name: Deploy CDK stacks
        id: deploy
        run: |
          pnpm --filter infra exec cdk deploy CertStack CoUkRedirectStack WebStack-Production \
            --require-approval never \
            --outputs-file cdk-outputs.json
          URL=$(jq -r '."WebStack-Production".DistributionUrl' cdk-outputs.json)
          echo "url=$URL" >> $GITHUB_OUTPUT
        working-directory: apps/infra
        env:
          CDK_DEFAULT_REGION: eu-west-1
